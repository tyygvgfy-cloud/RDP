name: RDP_Windows_Server
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Скачивание и подготовка Ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/b34edq9GLS8/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive -Path ngrok.zip -DestinationPath . -Force
          # Проверка, где оказался файл (для отладки)
          Get-ChildItem -Recurse -Filter ngrok.exe

      - name: Авторизация Ngrok
        run: |
          # Ожидает секрет NGROK_AUTH_TOKEN в настройках репозитория
          ./ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Настройка системы и RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          # Создаем пользователя
          net user runneradmin MyPassword123! /add
          net localgroup administrators runneradmin /add

      - name: Запуск туннеля и получение адреса
        run: |
          Start-Process Powershell -ArgumentList '-Noexit -Command "./ngrok.exe tcp 3389"'
          Start-Sleep -Seconds 10
          # Выводим публичный адрес прямо в консоль GitHub
          Invoke-RestMethod http://localhost:4040/api/tunnels | Select-Object -ExpandProperty tunnels | Select-Object -ExpandProperty public_url

      - name: Удержание сессии (Keep Alive)
        run: |
          Write-Host "=========================================="
          Write-Host "RDP сервер активен!"
          Write-Host "Пользователь: runneradmin"
          Write-Host "Пароль: MyPassword123!"
          Write-Host "Если адрес выше не появился, проверь Dashboard на ngrok.com"
          Write-Host "=========================================="
          # Максимальное время работы GitHub Action (6 часов)
          Start-Sleep -Seconds 21600
