name: RDP_Windows_Server
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Установка Ngrok через Chocolatey
        run: |
          choco install ngrok -y

      - name: Авторизация Ngrok
        run: |
          # Ожидает секрет NGROK_AUTH_TOKEN в настройках репозитория
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Настройка системы и RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          # Создаем пользователя
          net user runneradmin MyPassword123! /add
          net localgroup administrators runneradmin /add

      - name: Запуск туннеля и получение адреса
        run: |
          Start-Process Powershell -ArgumentList '-Noexit -Command "ngrok tcp 3389"'
          Start-Sleep -Seconds 15
          # Выводим публичный адрес прямо в консоль GitHub
          $tunnels = Invoke-RestMethod http://localhost:4040/api/tunnels
          $addr = $tunnels.tunnels[0].public_url
          Write-Host "=========================================="
          Write-Host "АДРЕС ДЛЯ ПОДКЛЮЧЕНИЯ: $addr"
          Write-Host "=========================================="

      - name: Удержание сессии (Keep Alive)
        run: |
          Write-Host "=========================================="
          Write-Host "RDP сервер активен!"
          Write-Host "Пользователь: runneradmin"
          Write-Host "Пароль: MyPassword123!"
          Write-Host "=========================================="
          # Максимальное время работы GitHub Action (6 часов)
          Start-Sleep -Seconds 21600

