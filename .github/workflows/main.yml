name: RDP_Windows_Server
on: workflow_dispatch # Запуск вручную через вкладку Actions

jobs:
  build:
    runs-on: windows-latest # Используем Windows вместо Ubuntu
    steps:
      - name: Скачивание и установка Ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/b34edq9GLS8/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          
      - name: Настройка Ngrok
        run: |
          # ВНИМАНИЕ: Тебе нужно добавить NGROK_AUTH_TOKEN в Settings -> Secrets -> Actions своего репозитория
          .\ngrok\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
      - name: Включение удаленного рабочего стола (RDP)
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          
      - name: Создание пользователя для входа
        run: |
          net user runneradmin MyPassword123! /add
          net localgroup administrators runneradmin /add
          
      - name: Запуск туннеля Ngrok
        run: |
          Start-Process Powershell -ArgumentList '-Noexit -Command ".\ngrok\ngrok.exe tcp 3389"'
          
      - name: Ожидание подключения (Keep Alive)
        run: |
          Write-Host "RDP готов! Проверь адрес в консоли Ngrok (на их сайте или в логах)"
          Write-Host "Пользователь: runneradmin"
          Write-Host "Пароль: MyPassword123!"
          Start-Sleep -Seconds 21600 # Сессия будет длиться 6 часов (максимум для GitHub)
