name: RDP_Windows_Cloudflare
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Скачивание и установка Cloudflared
        run: |
          Invoke-WebRequest https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi -OutFile cloudflared.msi
          Start-Process msiexec.exe -ArgumentList '/i cloudflared.msi /quiet /norestart' -Wait

      - name: Настройка RDP и Пользователя
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          # Создаем пользователя для входа
          net user runneradmin MyPassword123! /add
          net localgroup administrators runneradmin /add

      - name: Запуск туннеля Cloudflare
        run: |
          # Запускаем туннель без необходимости авторизации (Quick Tunnel)
          Start-Process powershell -ArgumentList "-NoExit -Command `"cloudflared tunnel --url tcp://localhost:3389`""

      - name: Получение ссылки для подключения
        run: |
          Write-Host "=========================================="
          Write-Host "ОЖИДАНИЕ ССЫЛКИ ОТ CLOUDFLARE..."
          Start-Sleep -Seconds 20
          Write-Host "ВНИМАНИЕ: Ищи ссылку в логах этого шага чуть выше или ниже."
          Write-Host "Она будет выглядеть как: https://some-random-words.trycloudflare.com"
          Write-Host "=========================================="
          Write-Host "ЛОГИН: runneradmin"
          Write-Host "ПАРОЛЬ: MyPassword123!"
          Write-Host "=========================================="

      - name: Поддержание сессии (6 часов)
        run: |
          # Чтобы сервер не выключился
          Start-Sleep -Seconds 21600
