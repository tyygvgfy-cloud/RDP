name: RDP_Windows_Server
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Установка Ngrok
        uses: zeelo/install-ngrok-action@v1

      - name: Авторизация Ngrok
        run: |
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Настройка RDP и Пользователя
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          net user runneradmin MyPassword123! /add
          net localgroup administrators runneradmin /add

      - name: Запуск туннеля
        run: |
          Start-Process powershell -ArgumentList "-NoExit -Command `"ngrok tcp --region eu 3389`""

      - name: Получение адреса подключения
        run: |
          $max_attempts = 10
          $attempt = 0
          $addr = ""
          while (-not $addr -and $attempt -lt $max_attempts) {
              Start-Sleep -Seconds 5
              try {
                  $response = Invoke-RestMethod http://localhost:4040/api/tunnels
                  $addr = $response.tunnels[0].public_url
              } catch {
                  Write-Host "Ожидание туннеля... попытка $($attempt + 1)"
              }
              $attempt++
          }
          Write-Host "=========================================="
          if ($addr) {
              Write-Host "АДРЕС ДЛЯ ПОДКЛЮЧЕНИЯ: $addr"
          } else {
              Write-Host "ОШИБКА: Не удалось получить адрес. Проверь NGROK_AUTH_TOKEN!"
          }
          Write-Host "Пользователь: runneradmin"
          Write-Host "Пароль: MyPassword123!"
          Write-Host "=========================================="

      - name: Удержание сессии (6 часов)
        run: |
          Start-Sleep -Seconds 21600
