name: RDP_Windows_Server
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Установка Ngrok
        run: |
          choco install ngrok -y

      - name: Авторизация
        run: |
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Настройка RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          net user runneradmin MyPassword123! /add
          net localgroup administrators runneradmin /add

      - name: Запуск туннеля
        run: |
          # Запускаем на случайном порту, чтобы обойти простые фильтры
          Start-Process powershell -ArgumentList "-NoExit -Command `"ngrok tcp 3389`""

      - name: Вывод адреса
        run: |
          Start-Sleep -Seconds 20
          $info = Invoke-RestMethod http://localhost:4040/api/tunnels
          $url = $info.tunnels[0].public_url
          Write-Host "=========================================="
          Write-Host "ПОДКЛЮЧАЙСЯ ТУТ: $url"
          Write-Host "ЛОГИН: runneradmin"
          Write-Host "ПАРОЛЬ: MyPassword123!"
          Write-Host "=========================================="

      - name: Работа (6 часов)
        run: |
          Start-Sleep -Seconds 21600
