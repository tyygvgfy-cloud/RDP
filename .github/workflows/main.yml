name: RDP_Windows_Localtunnel
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Установка Node.js и Localtunnel
        run: |
          # Localtunnel работает на Node.js, который уже есть на виртуалке GitHub
          npm install -g localtunnel

      - name: Настройка RDP и Пользователя
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          # Создаем админа
          net user runneradmin MyPassword123! /add
          net localgroup administrators runneradmin /add

      - name: Запуск туннеля и вывод ссылки
        run: |
          # Запускаем туннель на порт RDP (3389)
          # Мы используем фоновый процесс через PowerShell
          Start-Process powershell -ArgumentList "-NoExit -Command `"lt --port 3389`""
          
          # Даем время на генерацию ссылки
          Start-Sleep -Seconds 20
          
          Write-Host "=========================================="
          Write-Host "СЕРВЕР ЗАПУЩЕН!"
          Write-Host "ЛОГИН: runneradmin"
          Write-Host "ПАРОЛЬ: MyPassword123!"
          Write-Host "ССЫЛКУ ИЩИ В ЛОГАХ ВЫШЕ (строка 'your url is: ...')"
          Write-Host "=========================================="

      - name: Удержание сессии (6 часов)
        run: |
          Start-Sleep -Seconds 21600
